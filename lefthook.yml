pre-commit:
  parallel: false
  commands:
    format:
      # Only format files actually staged for this commit — running prettier across the
      # whole repo would auto-stage unrelated working-tree drift via stage_fixed.
      # Calls bun directly: make format-files FILES="{staged_files}" broke because
      # lefthook expands {staged_files} without quotes, causing make to treat each
      # extra filename as a build target instead of part of the FILES= variable.
      glob: '*.{ts,tsx,js,jsx,md,json,yaml,yml}'
      run: bun x prettier --write --ignore-unknown {staged_files}
      stage_fixed: true
    lint:
      run: bun x eslint .
    scan-secrets:
      run: gitleaks git --staged --redact
    actionlint:
      glob: '.github/workflows/*.yml'
      run: actionlint {staged_files}
    check-sources-sorted:
      # Sources tables in README + license-matrix must stay alphabetical-by-country.
      # Three batches in a row landed entries in the wrong position; this catches
      # it before commit so the next forty entries stay sorted automatically.
      glob: '{README.md,docs/license-matrix.md}'
      run: python3 scripts/check-sources-sorted.py

commit-msg:
  commands:
    commitlint:
      run: bun x commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    typecheck:
      run: bun x tsc --noEmit -p tsconfig.eslint.json
    unit-tests:
      run: bun test --isolate --coverage
