pre-commit:
  parallel: false
  commands:
    format:
      run: make format
      stage_fixed: true
    lint:
      run: make lint
    scan-secrets:
      run: make secret-scan
    actionlint:
      glob: '.github/workflows/*.yml'
      run: actionlint {staged_files}

commit-msg:
  commands:
    commitlint:
      run: make commitlint COMMIT_MSG_FILE={1}

pre-push:
  parallel: true
  commands:
    typecheck:
      run: make typecheck
    unit-tests:
      run: make test
