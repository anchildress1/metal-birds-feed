name: Registry Refresh

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC; per-source cadence_days gates actual work
  workflow_dispatch:
    inputs:
      source:
        description: 'Source ID to refresh (e.g. faa). Leave blank to refresh all.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — translate and diff but do not write to R2'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sources: ${{ steps.list.outputs.sources }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Enumerate sources
        id: list
        env:
          INPUT_SOURCE: ${{ inputs.source }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_SOURCE" ]; then
            sources=$(jq -c -n --arg s "$INPUT_SOURCE" '[$s]')
          else
            sources=$(find sources -maxdepth 1 -name '*.yaml' -type f -print0 \
              | xargs -0 -n1 basename \
              | sed 's/\.yaml$//' \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "sources=$sources" >> "$GITHUB_OUTPUT"
          echo "Resolved sources: $sources"

  refresh:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJson(needs.discover.outputs.sources) }}
    concurrency:
      group: refresh-${{ matrix.source }}
      cancel-in-progress: false # never cancel a running refresh mid-write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build
        run: make build

      - name: Run refresh pipeline
        env:
          MBF_R2_ACCOUNT_ID: ${{ secrets.MBF_R2_ACCOUNT_ID }}
          MBF_R2_ACCESS_KEY_ID: ${{ secrets.MBF_R2_ACCESS_KEY_ID }}
          MBF_R2_SECRET_ACCESS_KEY: ${{ secrets.MBF_R2_SECRET_ACCESS_KEY }}
          MBF_R2_BUCKET_NAME: ${{ secrets.MBF_R2_BUCKET_NAME }}
          REFRESH_SOURCE: ${{ matrix.source }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bun run dist/pipeline.js

      - name: Upload refresh logs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: refresh-logs-${{ matrix.source }}-${{ github.run_id }}
          path: logs/
          retention-days: 90
