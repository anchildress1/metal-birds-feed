name: Registry Refresh

on:
  schedule:
    - cron: '0 6 1 * *' # 1st of every month at 06:00 UTC
  workflow_dispatch:
    inputs:
      source:
        description: 'Source ID to refresh (e.g. faa). Leave blank to refresh all.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — translate and diff but do not write to R2'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false # never cancel a running refresh mid-write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      MBF_R2_ACCOUNT_ID: ${{ secrets.MBF_R2_ACCOUNT_ID }}
      MBF_R2_ACCESS_KEY_ID: ${{ secrets.MBF_R2_ACCESS_KEY_ID }}
      MBF_R2_SECRET_ACCESS_KEY: ${{ secrets.MBF_R2_SECRET_ACCESS_KEY }}
      MBF_R2_BUCKET_NAME: ${{ secrets.MBF_R2_BUCKET_NAME }}
      REFRESH_SOURCE: ${{ inputs.source || '' }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run refresh pipeline
        run: bun run src/pipeline.ts

      - name: Upload refresh logs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: refresh-logs-${{ github.run_id }}
          path: logs/
          retention-days: 90
